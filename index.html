     <script type="module">
          import * as ExcalidrawLib from 'https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.js?external=react,react-dom';
          const { convertToExcalidrawElements } = ExcalidrawLib;
          import React from "react";
          import { createRoot } from "https://esm.sh/react-dom@19.0.0/client";

          class IDBStorage {
               constructor(dbName = 'ksai_note-storage', storeName = 'keyvaluepairs') {
                    this.storeName = storeName;
                    this.dbPromise = new Promise((resolve, reject) => {
                         const request = indexedDB.open(dbName, 1);
                         request.onupgradeneeded = event => {
                              const db = event.target.result;
                              if (!db.objectStoreNames.contains(this.storeName)) {
                                   db.createObjectStore(this.storeName);
                              }
                         };
                         request.onsuccess = event => resolve(event.target.result);
                         request.onerror = event => reject(event.target.error);
                    });
               }
               async #getStore(mode) {
                    const db = await this.dbPromise;
                    return db.transaction(this.storeName, mode).objectStore(this.storeName);
               }

               async getItem(key) {
                    const store = await this.#getStore('readonly');
                    return new Promise((resolve, reject) => {
                         const request = store.get(key);
                         request.onsuccess = () => resolve(request.result);
                         request.onerror = () => reject(request.error);
                    });
               }

               async setItem(key, value) {
                    const store = await this.#getStore('readwrite');
                    return new Promise((resolve, reject) => {
                         const request = store.put(value, key);
                         request.onsuccess = () => resolve();
                         request.onerror = () => reject(request.error);
                    });
               }

               async removeItem(key) {
                    const store = await this.#getStore('readwrite');
                    return new Promise((resolve, reject) => {
                         const request = store.delete(key);
                         request.onsuccess = () => resolve();
                         request.onerror = () => reject(request.error);
                    });
               }
          }

          // DONT EVER WRITE USELESS COMMENTS IN CODE, BETTER DONT WRITE COMMENTS AT ALL
          class ksai_note {
               constructor() {
                    this.lastKnownSelectionIds = {};
                    this.currentNotebook = null;
                    this.currentSection = null;
                    this.currentSubsection = null;
                    this.currentEditingId = null;
                    this.currentMode = 'draw';
                    this.excalidrawAPI = null;
                    this.excalidrawRoot = null;
                    this.isLoading = false;
                    this.saveTimeout = null;
                    this.currentTheme = 'dark';
                    /*
                         === FOR EACH AND EVERY PLUGIN ===
                         you should manage your entire state by "the one" function that you get to add to this
                         particular class. Like you can see down, there should NOT be any other things, that is 
                         going to be changed for a plugin, you should do entirely everything functionally, in just
                         one function.
                         you can use like this.pluginThemeSwitch_variableName like that to maintain state inside the
                         function itself. Use function inside function for organization or lambdas as well.
                    */
                    this.pluginButtons = [
                         {
                              label: '⇔',
                              action: 'pluginThemeSwitch'
                         },
                         {
                              label: 'plt',
                              action: 'pluginShowMathPlotter'
                         },
                         {
                              label: 'ai',
                              action: 'pluginShowMarkAI'
                         },
                         {
                              label: '🎤',
                              action: 'pluginWhisper'
                         },
                         {
                              label: '🎬',
                              action: 'pluginPresentation'
                         },
                         {
                              label: '📋',
                              action: 'pluginCopySelectedText'
                         }
                    ];
               }

               async init() {
                    this.storage = new IDBStorage();
                    this.notebooks = JSON.parse(await this.storage.getItem('notebooks') || '[]');
                    this.expandedNotebooks = JSON.parse(await this.storage.getItem('expandedNotebooks') || '[]');
                    this.expandedSections = JSON.parse(await this.storage.getItem('expandedSections') || '[]');

                    this.renderNotebooks();

                    const strokeSlider = document.getElementById('strokeWidthSlider');
                    if (strokeSlider) {
                         strokeSlider.addEventListener('input', (event) => {
                              this.setStrokeWidth(event.target.value);
                         });
                    }
                    const fontSelect = document.getElementById('fontFamilySelect');
                    if (fontSelect) {
                         fontSelect.addEventListener('change', (event) => {
                              this.setFontFamily(event.target.value);
                         });
                    }

                    this.renderColorPalette()
                    this.renderPlugins();
                    this.applySidebarState()
               }

               toggleSidebar() {
                    const sidebar = document.querySelector('.sidebar');
                    if (sidebar) {
                         sidebar.classList.toggle('collapsed');
                         this.isSidebarCollapsed = sidebar.classList.contains('collapsed');
                         this.storage.setItem('sidebarCollapsed', JSON.stringify(this.isSidebarCollapsed));
                    }
               }

               applySidebarState() {
                    if (this.isSidebarCollapsed) {
                         document.querySelector('.sidebar')?.classList.add('collapsed');
                    }
               }

               renderColorPalette() {
                    const colors = [
                         '#000000', '#e03131', '#2f9e44', '#1971c2', '#f08c00',
                         '#862e9c', '#c92a2a', '#5f3dc4', '#ffffff', '#868e96'
                    ];
                    const paletteContainer = document.getElementById('colorPalette');
                    if (!paletteContainer) return;

                    paletteContainer.innerHTML = '';
                    colors.forEach((color, index) => {
                         const swatch = document.createElement('div');
                         swatch.className = 'color-swatch';
                         if (index === 0) {
                              swatch.classList.add('active');
                         }
                         swatch.style.backgroundColor = color;
                         swatch.dataset.color = color;

                         if (color === '#ffffff') {
                              swatch.style.border = '1px solid #ced4da';
                         }

                         swatch.addEventListener('click', () => this.setStrokeColor(color));
                         paletteContainer.appendChild(swatch);
                    });
               }

               generateId() {
                    return Date.now().toString(36) + Math.random().toString(36).substr(2);
               }

               async saveToStorage() {
                    await this.storage.setItem('notebooks', JSON.stringify(this.notebooks));
                    await this.storage.setItem('expandedNotebooks', JSON.stringify(this.expandedNotebooks));
                    await this.storage.setItem('expandedSections', JSON.stringify(this.expandedSections));
               }

               async createNotebook(name) {
                    const notebook = {
                         id: this.generateId(),
                         name: name,
                         sections: [],
                         createdAt: new Date().toISOString(),
                         presentationKeyframes: []
                    };
                    this.notebooks.push(notebook);
                    await this.saveToStorage();
                    this.renderNotebooks();
                    return notebook;
               }

               async createSection(notebookId, name) {
                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    if (notebook) {
                         const section = {
                              id: this.generateId(),
                              name: name,
                              subsections: [],
                              drawingData: null,
                              createdAt: new Date().toISOString()
                         };
                         notebook.sections.push(section);
                         await this.saveToStorage();
                         this.renderNotebooks();
                         return section;
                    }
               }

               async createSubsection(notebookId, sectionId, name) {
                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    if (notebook) {
                         const section = notebook.sections.find(s => s.id === sectionId);
                         if (section) {
                              const subsection = {
                                   id: this.generateId(),
                                   name: name,
                                   drawingData: null,
                                   createdAt: new Date().toISOString()
                              };
                              section.subsections.push(subsection);
                              await this.saveToStorage();
                              this.renderNotebooks();
                              return subsection;
                         }
                    }
               }

               async deleteNotebook(id) {
                    if (confirm('Are you sure you want to delete this notebook? This action cannot be undone.')) {
                         this.notebooks = this.notebooks.filter(n => n.id !== id);
                         await this.saveToStorage();
                         this.renderNotebooks();
                         this.showEmptyState();
                    }
               }

               async deleteSection(notebookId, sectionId) {
                    if (confirm('Are you sure you want to delete this section?')) {
                         const notebook = this.notebooks.find(n => n.id === notebookId);
                         if (notebook) {
                              notebook.sections = notebook.sections.filter(s => s.id !== sectionId);
                              await this.saveToStorage();
                              this.renderNotebooks();
                              if (this.currentSection === sectionId) {
                                   this.showEmptyState();
                              }
                         }
                    }
               }

               async deleteSubsection(notebookId, sectionId, subsectionId) {
                    if (confirm('Are you sure you want to delete this subsection?')) {
                         const notebook = this.notebooks.find(n => n.id === notebookId);
                         if (notebook) {
                              const section = notebook.sections.find(s => s.id === sectionId);
                              if (section) {
                                   section.subsections = section.subsections.filter(sub => sub.id !== subsectionId);
                                   await this.saveToStorage();
                                   this.renderNotebooks();
                                   if (this.currentSubsection === subsectionId) {
                                        this.showEmptyState();
                                   }
                              }
                         }
                    }
               }

               toggleNotebook(notebookId) {
                    const index = this.expandedNotebooks.indexOf(notebookId);
                    if (index > -1) {
                         this.expandedNotebooks.splice(index, 1);
                    } else {
                         this.expandedNotebooks.push(notebookId);
                    }
                    this.saveToStorage();
                    this.renderNotebooks();
               }

               toggleSection(sectionId) {
                    const index = this.expandedSections.indexOf(sectionId);
                    if (index > -1) {
                         this.expandedSections.splice(index, 1);
                    } else {
                         this.expandedSections.push(sectionId);
                    }
                    this.saveToStorage();
                    this.renderNotebooks();
               }

               showNotification = (() => {
                    let activeNotification = {};

                    return function (message, duration = 3000, type = 'info') {
                         if (activeNotification.element) {
                              clearTimeout(activeNotification.outTimer);
                              clearTimeout(activeNotification.removeTimer);
                              activeNotification.element.remove();
                         }

                         const notification = document.createElement('div');
                         notification.textContent = message;

                         const colors = {
                              info: '#0078d4',
                              success: '#2f9e44',
                              error: '#e03131'
                         };

                         Object.assign(notification.style, {
                              position: 'fixed',
                              left: '50%',
                              top: '30px',
                              transform: 'translate(-50%, -150%)',
                              opacity: '0',
                              padding: '12px 20px',
                              borderRadius: '6px',
                              backgroundColor: colors[type] || colors.info,
                              color: 'white',
                              boxShadow: '0 4px 12px rgba(0,0,0,0.25)',
                              zIndex: '9999',
                              transition: 'opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1)',
                              fontSize: '14px',
                              fontWeight: '600',
                              textAlign: 'center'
                         });

                         document.body.appendChild(notification);

                         setTimeout(() => {
                              notification.style.opacity = '1';
                              notification.style.transform = 'translate(-50%, 0)';
                         }, 50);

                         const outTimer = setTimeout(() => {
                              notification.style.opacity = '0';
                              notification.style.transform = 'translate(-50%, -150%)';

                              const removeTimer = setTimeout(() => {
                                   notification.remove();
                                   if (activeNotification.element === notification) {
                                        activeNotification = {};
                                   }
                              }, 100);

                              activeNotification.removeTimer = removeTimer;
                         }, duration);

                         activeNotification = {
                              element: notification,
                              outTimer: outTimer,
                              removeTimer: null // removeTimer is set later
                         };
                    };
               })();

                                    </div>

                                   if (isSectionExpanded && section.subsections.length > 0) {

                                        section.subsections.forEach(subsection => {

               selectSection(notebookId, sectionId) {
                    if (this.isLoading) return;
                    this.deinitializeDrawMode()
                    this.isLoading = true;

                    this.saveCurrentContent();
                    this.currentNotebook = notebookId;
                    this.currentSection = sectionId;
                    this.currentSubsection = null;
                    this.currentEditingId = `${notebookId}-${sectionId}`;

                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    const section = notebook.sections.find(s => s.id === sectionId);

                    this.updateHeader(notebook.name, section.name, '');
                    this.loadContent(section);
                    this.renderNotebooks();
               }

               selectSubsection(notebookId, sectionId, subsectionId) {
                    if (this.isLoading) return;
                    this.deinitializeDrawMode();
                    this.isLoading = true;

                    this.saveCurrentContent();
                    this.currentNotebook = notebookId;
                    this.currentSection = sectionId;
                    this.currentSubsection = subsectionId;
                    this.currentEditingId = `${notebookId}-${sectionId}-${subsectionId}`;

                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    const section = notebook.sections.find(s => s.id === sectionId);
                    const subsection = section.subsections.find(sub => sub.id === subsectionId);

                    this.updateHeader(notebook.name, section.name, subsection.name);
                    this.loadContent(subsection);
                    this.renderNotebooks();
               }

               updateHeader(notebookName, sectionName, subsectionName) {
                    const breadcrumb = document.getElementById('breadcrumb');
                    const pageTitle = document.getElementById('pageTitle');
                    const contentHeader = document.getElementById('contentHeader');

                    let breadcrumbText = `📓 ${notebookName} > 📄 ${sectionName}`;

                    if (subsectionName) {
                         breadcrumbText += ` > 📋 ${subsectionName}`;
                         titleText = subsectionName;
                    }

                    breadcrumb.textContent = breadcrumbText;
                    pageTitle.textContent = titleText;
                    contentHeader.style.display = 'flex';

               loadContent(item) {
                    const emptyState = document.getElementById('emptyState');
                    emptyState.style.display = 'none';

                    if (item.drawingData) {
                         this.initializeExcalidraw(item.drawingData);
                    } else {
                         this.initializeExcalidraw();
                    }

               }

               initializeDrawMode() {
                    this.currentMode = 'draw';
                    const excalidrawContainer = document.getElementById('excalidrawContainer');
                    excalidrawContainer.classList.remove('hidden');
                    if (!this.excalidrawRoot) {
                         this.initializeExcalidraw();
                    }
               }

               deinitializeDrawMode() {
                    this.currentMode = 'draw';
                    const excalidrawContainer = document.getElementById('excalidrawContainer');
                    excalidrawContainer.classList.add('hidden');
               }

               initializeExcalidraw(initialData = null) {
                    const container = document.getElementById('excalidrawContainer');
                    if (this.excalidrawRoot) {
                         this.excalidrawRoot.unmount();
                    }

                    const self = this;

                    const fullInitialData = {
                         elements: initialData?.elements || [],
                         files: initialData?.files || {},
                         appState: {
                              theme: this.currentTheme,
                              zenModeEnabled: true,
                              currentItemStrokeWidth: parseFloat(document.getElementById('strokeWidthSlider')?.value || 0.3),
                              currentItemStrokeColor: document.querySelector('.color-swatch.active')?.dataset.color || '#000000',
                              currentItemFontFamily: parseInt(document.getElementById('fontFamilySelect')?.value || 4),
                              currentItemFontSize: parseInt(document.querySelector('.size-btn.active')?.value || '28'),
                              ...(initialData?.appState || {})
                         }
                    };

                    const ExcalidrawComponent = React.createElement(ExcalidrawLib.Excalidraw, {
                         excalidrawAPI: (api) => {
                              self.excalidrawAPI = api;
                         },
                         onChange: (elements, appState) => {
                              self.saveDrawingData(elements, appState);
                         },
                         UIOptions: {
                              canvasActions: {
                                   changeViewBackgroundColor: false
                              }
                         },
                         initialData: fullInitialData
                    });

                    this.excalidrawRoot = createRoot(container);
                    this.excalidrawRoot.render(ExcalidrawComponent);

                    const excalidrawContainer = document.getElementById('excalidrawContainer');
                    if (excalidrawContainer) {
                         excalidrawContainer.addEventListener('pointerup', () => {
                              if (self.excalidrawAPI) {
                                   self.lastKnownSelectionIds = self.excalidrawAPI.getAppState().selectedElementIds;
                              }
                         }, true);
                    }

                    setTimeout(() => {
                         this.isLoading = false;
                         this.initializeDrawMode();
                    }, 200)
               }

               setStrokeWidth(width) {
                    if (!this.excalidrawAPI) return;

                    const numericWidth = parseFloat(width);
                    const selectedElementIds = this.excalidrawAPI.getAppState().selectedElementIds;

                    if (Object.keys(selectedElementIds).length > 0) {
                         const allElements = this.excalidrawAPI.getSceneElements();
                         const newElements = allElements.map(element => {
                              if (selectedElementIds[element.id]) {
                                   return { ...element, strokeWidth: numericWidth };
                              }
                              return element;
                         });
                         this.excalidrawAPI.updateScene({ elements: newElements });
                    }

                    this.excalidrawAPI.updateScene({
                         appState: { currentItemStrokeWidth: numericWidth }
                    });

                    const valueDisplay = document.getElementById('strokeWidthValue');
                    if (valueDisplay) valueDisplay.textContent = numericWidth.toFixed(1);
               }


               setStrokeColor(color) {
                    if (!this.excalidrawAPI) return;

                    const selectedElementIds = this.excalidrawAPI.getAppState().selectedElementIds;

                    if (Object.keys(selectedElementIds).length > 0) {
                         const allElements = this.excalidrawAPI.getSceneElements();
                         const newElements = allElements.map(element => {
                              if (selectedElementIds[element.id]) {
                                   return { ...element, strokeColor: color };
                              }
                              return element;
                         });
                         this.excalidrawAPI.updateScene({ elements: newElements });
                    }

                    this.excalidrawAPI.updateScene({
                         appState: { currentItemStrokeColor: color }
                    });

                    document.querySelectorAll('.color-swatch').forEach(swatch => {
                         swatch.classList.toggle('active', swatch.dataset.color === color);
                    });
               }

               setFontFamily(fontValue) {
                    if (!this.excalidrawAPI) return;

                    const numericFont = parseInt(fontValue, 10);
                    const selectedElementIds = this.excalidrawAPI.getAppState().selectedElementIds;

                    if (Object.keys(selectedElementIds).length > 0) {
                         const allElements = this.excalidrawAPI.getSceneElements();
                         const newElements = allElements.map(element => {
                              if (selectedElementIds[element.id] && element.type === 'text') {
                                   return { ...element, fontFamily: numericFont };
                              }
                              return element;
                         });
                         this.excalidrawAPI.updateScene({ elements: newElements });
                    }

                    this.excalidrawAPI.updateScene({
                         appState: { currentItemFontFamily: numericFont }
                    });
               }

               setFontSize(size, clickedButton) {

                    if (Object.keys(selectedElementIds).length > 0) {
                         const allElements = this.excalidrawAPI.getSceneElements();
                         const newElements = allElements.map(element => {
                              if (selectedElementIds[element.id] && element.type === 'text') {
                                   return { ...element, fontSize: size };

                         });
                         this.excalidrawAPI.updateScene({ elements: newElements });

                         );
                         const firstElement = focusableElements[0];

                         if (e.shiftKey) { // Shift + Tab
                              if (document.activeElement === firstElement) {

               async plotEquation(options) {
                    const { equation: equationInput, thickness, ticks } = options;
                    if (!this.excalidrawAPI || !equationInput) return;

                    try {
                         const currentStrokeColor = this.excalidrawAPI.getAppState().currentItemStrokeColor;
                         const equation = equationInput.split('=')[1].trim();
                         const code = math.parse(equation).compile();
                         const data = d3.range(-10, 10.1, 0.1).map(x => ({ x, y: code.evaluate({ x }) })).filter(d => isFinite(d.y));

                         if (data.length < 2) throw new Error("Not enough data points to plot.");

                         const width = 400, height = 300;
                         const margin = { top: 20, right: 20, bottom: 30, left: 40 };
                         const svg = d3.create("svg").attr("width", width).attr("height", height).attr("viewBox", [0, 0, width, height]).style("background-color", "transparent");
                         const x = d3.scaleLinear().domain(d3.extent(data, d => d.x)).nice().range([margin.left, width - margin.right]);
                         const y = d3.scaleLinear().domain(d3.extent(data, d => d.y)).nice().range([height - margin.bottom, margin.top]);

                         svg.append("g").attr("transform", `translate(0,${height - margin.bottom})`).call(d3.axisBottom(x).ticks(ticks));
                         svg.append("g").attr("transform", `translate(${margin.left},0)`).call(d3.axisLeft(y).ticks(ticks));

                         svg.append("path").datum(data).attr("fill", "none").attr("stroke", currentStrokeColor).attr("stroke-width", thickness).attr("d", d3.line().x(d => x(d.x)).y(d => y(d.y)));

                         const svgString = new XMLSerializer().serializeToString(svg.node());

               async queryGemini(promptText, model, apiKey, imageBase64 = null) {
                    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                    const parts = [{ text: promptText }];
                    if (imageBase64) {
                         parts.push({
                              inline_data: {
                                   mime_type: "image/png",
                                   data: imageBase64
                              }
                         });
                    }

                    try {
                         const response = await fetch(API_URL, {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ contents: [{ parts: parts }] })
                         });

                         if (!response.ok) {
                              const errorData = await response.json();
                              throw new Error(`API Error (${response.status}): ${errorData.error.message}`);
                         }

                         const data = await response.json();
                         console.log("Full API Response:", JSON.stringify(data, null, 2));
                         if (!data.candidates || data.candidates.length === 0) {
                              const blockReason = data.promptFeedback?.blockReason || "No content returned";
                              throw new Error(`Request was blocked or returned no content. Reason: ${blockReason}`);
                         }
                         return data.candidates[0].content.parts[0].text;
                    } catch (error) {
                         console.error("Gemini API call failed:", error);
                         alert(`AI query failed: ${error.message}`);
                         return null;
                    }
               }

               async renderMarkdown(markdownText) {
                    if (!this.excalidrawAPI || !markdownText.trim()) return;

                    const appState = this.excalidrawAPI.getAppState();
                    const existingElements = this.excalidrawAPI.getSceneElements();

                    const FONT_FAMILY = parseInt(document.getElementById('fontFamilySelect')?.value || 4);
                    const STROKE_COLOR = document.querySelector('.color-swatch.active')?.dataset.color || '#000000';
                    const SIZES = {
                         H1: 58, H2: 48, H3: 38,
                         N: parseInt(document.querySelector('.size-btn.active')?.value || '28')
                    };

                    const PADDING = 15;
                    const LINE_HEIGHT = 1.25;
                    const INDENT_WIDTH = 35;

                    let elements = [];
                    let currentY = 0;

                    const canvasWidth = appState.width;
                    const avgCharWidth = SIZES.N * 0.6;
                    const maxChars = Math.floor((canvasWidth) / avgCharWidth);

                    const wrapText = (text, maxChars) => {
                         if (!text) return '';
                         return text.split('\n').map(originalLine => {
                              const words = originalLine.split(' ');
                              if (words.length === 0) return '';

                              let lines = [];
                              let currentLine = words.shift();

                              words.forEach(word => {
                                   if ((currentLine + ' ' + word).length > maxChars) {
                                        lines.push(currentLine);
                                        currentLine = word;
                                   } else {
                                        currentLine += ' ' + word;
                                   }
                              });
                              lines.push(currentLine);
                              return lines.join('\n');
                         }).join('\n');
                    };

                    const reconstructInline = (tokens) => tokens ? tokens.map(t => t.raw).join('') : '';

                    const processTokens = (tokens, listLevel = 0) => {
                         const currentIndent = listLevel * INDENT_WIDTH;

                         tokens.forEach(token => {
                              switch (token.type) {
                                   case 'space':
                                        currentY += PADDING / 2;
                                        break;

                                   case 'heading':
                                        elements.push({
                                             type: 'text', text: token.text,
                                             x: currentIndent, y: currentY,
                                             fontSize: SIZES[`H${token.depth}`] || SIZES.N,
                                             fontFamily: FONT_FAMILY, strokeColor: STROKE_COLOR
                                        });
                                        currentY += (SIZES[`H${token.depth}`] || SIZES.N) + PADDING;
                                        break;

                                   case 'paragraph':
                                        const pText = reconstructInline(token.tokens);
                                        const wrappedPText = wrapText(pText, maxChars);
                                        elements.push({
                                             type: 'text', text: wrappedPText,
                                             x: currentIndent, y: currentY,
                                             fontSize: SIZES.N, fontFamily: FONT_FAMILY,
                                             strokeColor: STROKE_COLOR, lineHeight: LINE_HEIGHT
                                        });
                                        currentY += SIZES.N * LINE_HEIGHT * wrappedPText.split('\n').length + PADDING;
                                        break;

                                   case 'text':
                                        const inlineText = reconstructInline(token.tokens);
                                        const wrappedInlineText = wrapText(inlineText, maxChars);
                                        elements.push({
                                             type: 'text', text: wrappedInlineText,
                                             x: currentIndent, y: currentY,
                                             fontSize: SIZES.N, fontFamily: FONT_FAMILY,
                                             strokeColor: STROKE_COLOR, lineHeight: LINE_HEIGHT
                                        });
                                        currentY += SIZES.N * LINE_HEIGHT * wrappedInlineText.split('\n').length;
                                        break;

                                   case 'list':
                                        token.items.forEach(item => {
                                             const bulletX = ((listLevel) * INDENT_WIDTH);
                                             elements.push({
                                                  type: 'text', text: '•',
                                                  x: bulletX, y: currentY,
                                                  fontSize: SIZES.N, fontFamily: FONT_FAMILY, strokeColor: STROKE_COLOR
                                             });

                                             processTokens(item.tokens, listLevel + 1);
                                        });
                                        currentY += PADDING / 2;
                                        break;

                                   case 'table':
                                        const headerBgColor = '#333333';
                                        const headerFontColor = '#ffffff';
                                        let tableRowY = currentY;
                                        const colWidths = token.header.map(() => 0);
                                        const allRows = [token.header, ...token.rows];
                                        allRows.forEach(row => row.forEach((cell, i) => {
                                             const cellText = reconstructInline(cell.tokens);
                                             colWidths[i] = Math.max(colWidths[i], cellText.length * SIZES.N * 0.65);
                                        }));
                                        allRows.forEach((row, rowIndex) => {
                                             let currentCellX = currentIndent;
                                             let maxCellHeight = 0;
                                             const renderedCells = row.map((cell, i) => {
                                                  const cellText = reconstructInline(cell.tokens);
                                                  const cellHeight = (cellText.split('\n').length * SIZES.N * LINE_HEIGHT) + PADDING;
                                                  maxCellHeight = Math.max(maxCellHeight, cellHeight);
                                                  return { text: cellText, width: colWidths[i] + PADDING * 2, align: token.align[i] || 'left' };
                                             });
                                             renderedCells.forEach(cellData => {
                                                  elements.push({
                                                       type: 'rectangle', x: currentCellX, y: tableRowY,
                                                       width: cellData.width, height: maxCellHeight, strokeColor: '#444',
                                                       backgroundColor: rowIndex === 0 ? headerBgColor : 'transparent', fillStyle: 'solid'
                                                  });
                                                  elements.push({
                                                       type: 'text', text: cellData.text,
                                                       x: currentCellX + PADDING, y: tableRowY + PADDING / 2,
                                                       fontSize: SIZES.N, fontFamily: FONT_FAMILY, textAlign: cellData.align,
                                                       strokeColor: rowIndex === 0 ? headerFontColor : STROKE_COLOR
                                                  });
                                                  currentCellX += cellData.width;
                                             });
                                             tableRowY += maxCellHeight;
                                        });
                                        currentY = tableRowY + PADDING;
                                        break;
                              }
                         });
                    };

                    const initialTokens = marked.lexer(markdownText);
                    processTokens(initialTokens);

                    const startX = -appState.scrollX + 100;
                    const startY = -appState.scrollY + 100;
                    elements.forEach(el => {
                         el.x = (el.x || 0) + startX;
                         el.y = (el.y || 0) + startY;
                    });

                    const newElements = ExcalidrawLib.convertToExcalidrawElements(elements);
                    this.excalidrawAPI.updateScene({ elements: [...existingElements, ...newElements] });
               }

               pluginWhisper(event) {
                    // --- 1. STATE INITIALIZATION ---
                    // Initializes state variables on the class instance the first time the plugin is ever run.
                    // Adheres to your "this.pluginName_variableName" rule.
                    if (this.pluginWhisper_isRecording === undefined) {
                         this.pluginWhisper_isRecording = false;
                         this.pluginWhisper_ui = null;
                         this.pluginWhisper_transcriber = null;
                         this.pluginWhisper_stream = null;
                         this.pluginWhisper_mediaRecorder = null;
                         this.pluginWhisper_recorderTimeout = null;
                    }

                    if (this.pluginWhisper_ui) {
                         return;
                    }

                    if (!this.currentEditingId) {
                         alert("Please select a page before starting transcription.");
                         return;
                    }

                    // --- 3. UI CREATION & POSITIONING ---
                    const ui = document.createElement('div');
                    this.pluginWhisper_ui = ui;
                    ui.id = 'whisper-plugin-ui';
                    ui.innerHTML = `
        <div class="plugin-header"><span>🎤 Local Transcription</span><button id="whisper-close-btn">×</button></div>
        <div class="plugin-content">
            <p style="margin:0; font-size:13px;">Status: <span id="whisper-status">Idle</span></p>
            <textarea id="whisper-transcript-view" readonly placeholder="Live transcript will appear here..."></textarea>
            <div style="display:flex; gap:8px;">
                <button id="whisper-record-btn" class="tool-btn" style="flex:1; background-color:#2f9e44;">Start</button>
                <button id="whisper-to-canvas-btn" class="tool-btn" style="flex:1;">Add to Canvas</button>
            </div>
        </div>`;
                    Object.assign(ui.style, { position: 'absolute', width: '300px', backgroundColor: '#2d2d30', border: '1px solid #404040', borderRadius: '6px', boxShadow: '0 4px 12px rgba(0,0,0,0.4)', zIndex: '1002', visibility: 'hidden' });
                    ui.querySelector('.plugin-header').style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background-color:#252526; border-bottom:1px solid #404040; color:#ccc; font-weight:600;';
                    ui.querySelector('#whisper-close-btn').style.cssText = 'background:none; border:none; color:#ccc; font-size:18px; cursor:pointer;';
                    ui.querySelector('.plugin-content').style.cssText = 'padding:12px; display:flex; flex-direction:column; gap:10px;';
                    ui.querySelector('#whisper-transcript-view').style.cssText = 'height:120px; resize:none; background-color:#1e1e1e; border:1px solid #555; border-radius:4px; color:#f0f0f0; padding:8px; font-size:12px;';

                    document.body.appendChild(ui);
                    const buttonRect = event.target.getBoundingClientRect();
                    const sidebarRect = document.getElementById('sidebar-id').getBoundingClientRect();
                    const uiWidth = 300;
                    ui.style.left = `${sidebarRect.left - uiWidth - 10}px`;
                    ui.style.top = `${buttonRect.top - ui.offsetHeight - 5}px`;
                    ui.style.visibility = 'visible';

                    // --- 4. ALL LOGIC AS NESTED FUNCTIONS ---
                    const statusLabel = ui.querySelector('#whisper-status');
                    const recordBtn = ui.querySelector('#whisper-record-btn');
                    const toCanvasBtn = ui.querySelector('#whisper-to-canvas-btn');
                    const closeBtn = ui.querySelector('#whisper-close-btn');

                    const transcribeAndRestart = async (audioBlob) => {
                         if (!this.pluginWhisper_transcriber) {
                              statusLabel.textContent = 'Loading Model...';
                              const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.0');
                              this.pluginWhisper_transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-base.en');
                              // this.pluginWhisper_transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en');
                         }
                         statusLabel.textContent = 'Transcribing...';

                         let audioUrl = null;
                         try {
                              audioUrl = URL.createObjectURL(audioBlob);
                              const output = await this.pluginWhisper_transcriber(audioUrl);
                              if (output.text && output.text.trim()) {
                                   const newText = output.text.trim();
                                   const key = `whisper_transcript_${this.currentEditingId}`;
                                   const existingTranscript = await this.storage.getItem(key) || '';
                                   const updatedTranscript = existingTranscript ? `${existingTranscript}\n${newText}` : newText;
                                   await this.storage.setItem(key, updatedTranscript);
                                   ui.querySelector('#whisper-transcript-view').value = updatedTranscript;
                              }
                         } catch (err) {
                              console.error("Transcription chunk failed:", err);
                         } finally {
                              if (audioUrl) URL.revokeObjectURL(audioUrl);
                              if (this.pluginWhisper_isRecording) {
                                   statusLabel.textContent = 'Recording...';
                                   startChunkRecording(); // Loop and start the next 10-second chunk
                              }
                         }
                    };

                    const startChunkRecording = () => {
                         navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                              this.pluginWhisper_stream = stream;
                              this.pluginWhisper_mediaRecorder = new MediaRecorder(stream);

                              this.pluginWhisper_mediaRecorder.ondataavailable = (e) => {
                                   if (e.data.size > 0) transcribeAndRestart(e.data);
                              };

                              this.pluginWhisper_mediaRecorder.start();
                              statusLabel.textContent = 'Recording...';

                              this.pluginWhisper_recorderTimeout = setTimeout(() => {
                                   if (this.pluginWhisper_mediaRecorder && this.pluginWhisper_mediaRecorder.state === "recording") {
                                        this.pluginWhisper_mediaRecorder.stop();
                                   }
                              }, 10000); // Stop after 10s to trigger dataavailable
                         }).catch(err => {
                              alert("Microphone access failed.");
                              this.pluginWhisper_isRecording = false;
                              recordBtn.textContent = 'Start';
                              recordBtn.style.backgroundColor = '#2f9e44';
                              statusLabel.textContent = 'Error';
                         });
                    };

                    const stopFullRecording = () => {
                         this.pluginWhisper_isRecording = false; // Prevents the loop in transcribeAndRestart
                         clearTimeout(this.pluginWhisper_recorderTimeout);
                         if (this.pluginWhisper_mediaRecorder && this.pluginWhisper_mediaRecorder.state === "recording") {
                              this.pluginWhisper_mediaRecorder.stop();
                         }
                         if (this.pluginWhisper_stream) {
                              this.pluginWhisper_stream.getTracks().forEach(track => track.stop());
                         }
                         recordBtn.textContent = 'Start';
                         recordBtn.style.backgroundColor = '#2f9e44';
                         statusLabel.textContent = 'Idle';
                    };

                    // --- 5. WIRING ---
                    this.storage.getItem(`whisper_transcript_${this.currentEditingId}`).then(transcript => {
                         if (transcript) ui.querySelector('#whisper-transcript-view').value = transcript;
                    });

                    recordBtn.onclick = () => {
                         if (this.pluginWhisper_isRecording) {
                              stopFullRecording();
                         } else {
                              this.pluginWhisper_isRecording = true;
                              recordBtn.textContent = 'Stop';
                              recordBtn.style.backgroundColor = '#e03131';
                              startChunkRecording();
                         }
                    };

                    toCanvasBtn.onclick = () => this.whisperAddTranscriptToCanvas();

                    closeBtn.onclick = () => {
                         if (this.pluginWhisper_isRecording) stopFullRecording();
                         ui.remove();
                         this.pluginWhisper_ui = null;
                    };

               async pluginCopySelectedText() {
                    if (!this.excalidrawAPI) {
                         alert("Excalidraw is not ready.");
                         return;
                    }

                    const selectedElementIds = this.excalidrawAPI.getAppState().selectedElementIds;
                    const allElements = this.excalidrawAPI.getSceneElements();

                    const combinedText = selectedTextElements

                         .join('\n\n');

                    try {

                         this.showNotification(`Copied ${selectedTextElements.length} text block(s) to clipboard!`, 1000);

                         console.error('Failed to copy text: ', err);
                         this.showNotification('Could not copy text to clipboard. See console for details.', 1000, 'error');

               pluginPresentation(event) {
                    // State initialization
                    if (this.pluginPresentation_isPresenting === undefined) {
                         this.pluginPresentation_isPresenting = false;
                         this.pluginPresentation_currentKeyframeIndex = 0;
                         this.pluginPresentation_ui = null;
                         this.pluginPresentation_keyboardHandler = null;
                         this.pluginPresentation_presentationOverlay = null;
                    }

                    if (!this.currentNotebook) {
                         alert("Select a notebook first");
                         return;
                    }

                    // Remove existing UI if present
                    if (this.pluginPresentation_ui) {
                         this.pluginPresentation_ui.remove();
                         this.pluginPresentation_ui = null;
                         return;
                    }

                    const button = event.target;
                    const rect = button.getBoundingClientRect();
                    const ui = document.createElement('div');
                    this.pluginPresentation_ui = ui;
                    ui.id = 'presentation-plugin-ui';

                    // Get current notebook and keyframes
                    const getCurrentNotebook = () => this.notebooks.find(n => n.id === this.currentNotebook);
                    const getKeyframes = () => {
                         const nb = getCurrentNotebook();
                         if (!nb.presentationKeyframes) nb.presentationKeyframes = [];
                         return nb.presentationKeyframes;
                    };

                    // Smooth interpolation function
                    const interpolateToKeyframe = (targetIndex, duration = 800) => {
                         const keyframes = getKeyframes();
                         const targetKeyframe = keyframes[targetIndex];
                         if (!targetKeyframe || !this.excalidrawAPI) return;

                         const startState = this.excalidrawAPI.getAppState();
                         const startTime = Date.now();

                         const animate = () => {
                              const elapsed = Date.now() - startTime;
                              const progress = Math.min(elapsed / duration, 1);

                              // Smooth ease-in-out cubic
                              const eased = progress < 0.5
                                   ? 4 * progress * progress * progress
                                   : 1 - Math.pow(-2 * progress + 2, 3) / 2;

                              this.excalidrawAPI.updateScene({
                                   appState: {
                                        scrollX: startState.scrollX + (targetKeyframe.viewState.scrollX - startState.scrollX) * eased,
                                        scrollY: startState.scrollY + (targetKeyframe.viewState.scrollY - startState.scrollY) * eased,
                                        zoom: {
                                             value: startState.zoom.value + (targetKeyframe.viewState.zoom.value - startState.zoom.value) * eased
                                        }
                                   }
                              });

                              if (progress < 1) {
                                   requestAnimationFrame(animate);
                              }
                         };

                         animate();
                    };

                    // Render function
                    const renderUI = () => {
                         const keyframes = getKeyframes();
                         const isPresenting = this.pluginPresentation_isPresenting;

                         if (isPresenting) {
                              // MINIMAL PRESENTATION OVERLAY
                              if (!this.pluginPresentation_presentationOverlay) {
                                   const overlay = document.createElement('div');
                                   this.pluginPresentation_presentationOverlay = overlay;
                                   overlay.id = 'presentation-overlay';
                                   overlay.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 18px; font-weight: bold; color: #0078d4;">
                            ${this.pluginPresentation_currentKeyframeIndex + 1} / ${keyframes.length}
                        </span>
                        <button id="pres-end-btn-overlay" style="background: #e03131; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;">
                            End
                        </button>
                    </div>
                `;
                                   Object.assign(overlay.style, {
                                        position: 'fixed',
                                        bottom: '20px',
                                        left: '20px',
                                        backgroundColor: 'rgba(37, 37, 38, 0.95)',
                                        border: '1px solid #404040',
                                        borderRadius: '6px',
                                        padding: '10px 15px',
                                        zIndex: '1003',
                                        boxShadow: '0 4px 12px rgba(0,0,0,0.4)'
                                   });
                                   document.body.appendChild(overlay);
                                   overlay.querySelector('#pres-end-btn-overlay').onclick = endPresentation;
                              } else {
                                   // Update counter
                                   this.pluginPresentation_presentationOverlay.querySelector('span').textContent =
                                        `${this.pluginPresentation_currentKeyframeIndex + 1} / ${keyframes.length}`;
                              }

                              // Hide the main UI during presentation
                              ui.style.display = 'none';
                              return;
                         } else {
                              ui.style.display = 'block';
                              // SETUP MODE UI
                              const keyframesList = keyframes.map((kf, idx) => {
                                   const nb = getCurrentNotebook();
                                   const section = nb.sections.find(s => s.id === kf.sectionId);
                                   const subsection = kf.subsectionId ? section?.subsections.find(sub => sub.id === kf.subsectionId) : null;
                                   const locationText = subsection ? `${section.name} > ${subsection.name}` : section?.name || 'Unknown';

                                   return `
                    <div class="keyframe-item" style="display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #3e3e42; border-radius: 4px; margin-bottom: 5px;">
                        <div style="flex: 1; cursor: pointer;" onclick="app.presentationGoToKeyframe(${idx})">
                            <div style="font-size: 12px; font-weight: 600;">${idx + 1}. Keyframe ${idx + 1}</div>
                            <div style="font-size: 11px; color: #999;">📄 ${locationText}</div>
                        </div>
                        <div style="display: flex; gap: 5px;">
                            <button class="action-btn" onclick="app.presentationDeleteKeyframe('${kf.id}')" title="Delete">×</button>
                        </div>
                    </div>
                `;
                              }).join('');

                              ui.innerHTML = `
                <div class="plugin-header">
                    <span>🎬 Presentation Setup</span>
                    <button id="pres-close-btn">×</button>
                </div>
                <div class="plugin-content">
                    <div style="margin-bottom: 10px;">
                        <button id="pres-add-keyframe-btn" class="tool-btn" style="width: 100%; background-color: #2f9e44;">
                            ➕ Add Current View
                        </button>
                    </div>
                    
                    <div style="max-height: 250px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #555; border-radius: 4px; padding: 5px; background: #1e1e1e;">
                        ${keyframes.length === 0
                                        ? '<p style="color: #888; text-align: center; padding: 20px; margin: 0;">No keyframes yet. Position your canvas and add views.</p>'
                                        : keyframesList
                                   }
                    </div>

                    <div style="display: flex; gap: 5px;">
                        <button id="pres-clear-btn" class="tool-btn" style="flex: 1; background-color: #555;" ${keyframes.length === 0 ? 'disabled' : ''}>
                            🗑️ Clear
                        </button>
                        <button id="pres-start-btn" class="tool-btn" style="flex: 2; background-color: #0078d4;" ${keyframes.length === 0 ? 'disabled' : ''}>
                            ▶️ Start
                        </button>
                    </div>
                </div>
            `;
                         }

                         // Apply styles
                         Object.assign(ui.style, {
                              position: 'absolute',
                              width: '350px',
                              backgroundColor: '#2d2d30',
                              border: '1px solid #404040',
                              borderRadius: '6px',
                              boxShadow: '0 4px 12px rgba(0,0,0,0.4)',
                              zIndex: '1002',
                              visibility: 'hidden'
                         });

                         ui.querySelector('.plugin-header').style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background-color: #252526; border-bottom: 1px solid #404040; color: #ccc; font-weight: 600;';
                         ui.querySelector('#pres-close-btn').style.cssText = 'background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer;';
                         ui.querySelector('.plugin-content').style.cssText = 'padding: 12px;';

                         // Position UI
                         const sidebarRect = document.getElementById('sidebar-id').getBoundingClientRect();
                         ui.style.left = `${sidebarRect.left - 360}px`;
                         ui.style.top = `${rect.top - ui.offsetHeight - 5}px`;
                         ui.style.visibility = 'visible';

                         // Wire up event handlers
                         ui.querySelector('#pres-close-btn').onclick = closeUI;

                         if (!isPresenting) {
                              ui.querySelector('#pres-add-keyframe-btn').onclick = captureKeyframe;
                              if (keyframes.length > 0) {
                                   ui.querySelector('#pres-clear-btn').onclick = clearAllKeyframes;
                                   ui.querySelector('#pres-start-btn').onclick = startPresentation;
                              }
                         }
                    };

                    // Helper functions
                    const closeUI = () => {
                         if (this.pluginPresentation_isPresenting) {
                              endPresentation();
                         }
                         ui.remove();
                         this.pluginPresentation_ui = null;
                         document.removeEventListener('mousedown', handleClickOutside);
                    };

                    const handleClickOutside = (e) => {
                         if (!ui.contains(e.target) && e.target !== button) {
                              closeUI();
                         }
                    };

                    const captureKeyframe = () => {
                         if (!this.excalidrawAPI) return;

                         const appState = this.excalidrawAPI.getAppState();
                         const keyframe = {
                              id: this.generateId(),
                              notebookId: this.currentNotebook,
                              sectionId: this.currentSection,
                              subsectionId: this.currentSubsection,
                              viewState: {
                                   scrollX: appState.scrollX,
                                   scrollY: appState.scrollY,
                                   zoom: appState.zoom
                              },
                              timestamp: Date.now()
                         };

                         const notebook = getCurrentNotebook();
                         notebook.presentationKeyframes.push(keyframe);
                         this.saveToStorage();
                         this.showNotification('Keyframe added!', 1000, 'success');
                         renderUI();
                    };

                    const clearAllKeyframes = () => {
                         if (confirm('Delete all keyframes for this notebook?')) {
                              const notebook = getCurrentNotebook();
                              notebook.presentationKeyframes = [];
                              this.saveToStorage();
                              this.showNotification('All keyframes cleared', 1000, 'info');
                              renderUI();
                         }
                    };

                    const startPresentation = () => {
                         const keyframes = getKeyframes();
                         if (keyframes.length === 0) return;

                         this.pluginPresentation_isPresenting = true;
                         this.pluginPresentation_currentKeyframeIndex = 0;

                         // Set up keyboard navigation
                         this.pluginPresentation_keyboardHandler = (e) => {
                              if (!this.pluginPresentation_isPresenting) return;

                              if (e.key === 'ArrowRight') {
                                   e.preventDefault();
                                   nextKeyframe();
                              } else if (e.key === 'ArrowLeft') {
                                   e.preventDefault();
                                   previousKeyframe();
                              } else if (e.key === 'Escape') {
                                   e.preventDefault();
                                   endPresentation();
                              }
                         };

                         document.addEventListener('keydown', this.pluginPresentation_keyboardHandler);
                         renderUI();
                         navigateToKeyframe(0);
                    };

                    const endPresentation = () => {
                         this.pluginPresentation_isPresenting = false;
                         if (this.pluginPresentation_keyboardHandler) {
                              document.removeEventListener('keydown', this.pluginPresentation_keyboardHandler);
                              this.pluginPresentation_keyboardHandler = null;
                         }
                         if (this.pluginPresentation_presentationOverlay) {
                              this.pluginPresentation_presentationOverlay.remove();
                              this.pluginPresentation_presentationOverlay = null;
                         }
                         renderUI();
                    };

                    const navigateToKeyframe = (index) => {
                         const keyframes = getKeyframes();
                         const keyframe = keyframes[index];
                         if (!keyframe) return;

                         this.pluginPresentation_currentKeyframeIndex = index;

                         // Check if we need to change pages
                         const needsPageChange =
                              keyframe.sectionId !== this.currentSection ||
                              keyframe.subsectionId !== this.currentSubsection;

                         if (needsPageChange) {
                              // Navigate to page first
                              if (keyframe.subsectionId) {
                                   this.selectSubsection(keyframe.notebookId, keyframe.sectionId, keyframe.subsectionId);
                              } else {
                                   this.selectSection(keyframe.notebookId, keyframe.sectionId);
                              }

                              // Wait for page to load, then animate
                              setTimeout(() => {
                                   if (this.excalidrawAPI) {
                                        interpolateToKeyframe(index, 800);
                                   }
                                   if (this.pluginPresentation_presentationOverlay) {
                                        this.pluginPresentation_presentationOverlay.querySelector('span').textContent =
                                             `${index + 1} / ${keyframes.length}`;
                                   }
                              }, 400);
                         } else {
                              // Same page, just animate viewport
                              interpolateToKeyframe(index, 800);
                              if (this.pluginPresentation_presentationOverlay) {
                                   this.pluginPresentation_presentationOverlay.querySelector('span').textContent =
                                        `${index + 1} / ${keyframes.length}`;
                              }
                         }
                    };

                    const nextKeyframe = () => {
                         const keyframes = getKeyframes();
                         const nextIndex = this.pluginPresentation_currentKeyframeIndex + 1;
                         if (nextIndex < keyframes.length) {
                              navigateToKeyframe(nextIndex);
                         }
                    };

                    const previousKeyframe = () => {
                         const prevIndex = this.pluginPresentation_currentKeyframeIndex - 1;
                         if (prevIndex >= 0) {
                              navigateToKeyframe(prevIndex);
                         }
                    };

                    // Expose functions to window for onclick handlers
                    window.app.presentationGoToKeyframe = (idx) => {
                         navigateToKeyframe(idx);
                    };

                    window.app.presentationDeleteKeyframe = (keyframeId) => {
                         const notebook = getCurrentNotebook();
                         notebook.presentationKeyframes = notebook.presentationKeyframes.filter(k => k.id !== keyframeId);
                         this.saveToStorage();
                         this.showNotification('Keyframe deleted', 1000, 'info');
                         renderUI();
                    };

                    // Initial render and setup
                    document.body.appendChild(ui);
                    renderUI();

                    // Add click outside handler
                    setTimeout(() => {
                         document.addEventListener('mousedown', handleClickOutside);
                    }, 100);
               }
