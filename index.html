     <script type="module">
          import * as ExcalidrawLib from 'https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.js?external=react,react-dom';
          const { convertToExcalidrawElements } = ExcalidrawLib;
          import React from "react";

          /**
 * A class that mimics the storage API (getItem, setItem, removeItem)
 * but uses IndexedDB for storage. This allows for storing much larger
 * amounts of data asynchronously without blocking the main thread.
 */
          class IDBStorage {
               constructor(dbName = 'ksai_note-storage', storeName = 'keyvaluepairs') {
                    this.storeName = storeName;
                    this.dbPromise = new Promise((resolve, reject) => {
                         const request = indexedDB.open(dbName, 1);
                         request.onupgradeneeded = event => {
                              const db = event.target.result;
                              if (!db.objectStoreNames.contains(this.storeName)) {
                                   db.createObjectStore(this.storeName);
                              }
                         };
                         request.onsuccess = event => resolve(event.target.result);
                         request.onerror = event => reject(event.target.error);
                    });
               }

               /**
                * Helper method to get a transaction and object store.
                * @param {IDBTransactionMode} mode - 'readonly' or 'readwrite'.
                * @returns {Promise<IDBObjectStore>}
                */
               async #getStore(mode) {
                    const db = await this.dbPromise;
                    return db.transaction(this.storeName, mode).objectStore(this.storeName);
               }

               /**
                * Retrieves an item from IndexedDB. Mimics storage.getItem.
                * @param {string} key - The key of the item to retrieve.
                * @returns {Promise<any>} The retrieved value, or undefined if not found.
                */
               async getItem(key) {
                    const store = await this.#getStore('readonly');
                    return new Promise((resolve, reject) => {
                         const request = store.get(key);
                         request.onsuccess = () => resolve(request.result);
                         request.onerror = () => reject(request.error);
                    });
               }

               /**
                * Saves an item to IndexedDB. Mimics storage.setItem.
                * @param {string} key - The key of the item to save.
                * @param {any} value - The value to save.
                * @returns {Promise<void>}
                */
               async setItem(key, value) {
                    const store = await this.#getStore('readwrite');
                    return new Promise((resolve, reject) => {
                         const request = store.put(value, key);
                         request.onsuccess = () => resolve();
                         request.onerror = () => reject(request.error);
                    });
               }

               /**
                * Removes an item from IndexedDB. Mimics storage.removeItem.
                * @param {string} key - The key of the item to remove.
                * @returns {Promise<void>}
                */
               async removeItem(key) {
                    const store = await this.#getStore('readwrite');
                    return new Promise((resolve, reject) => {
                         const request = store.delete(key);
                         request.onsuccess = () => resolve();
                         request.onerror = () => reject(request.error);
                    });
               }
          }


          class ksai_note {
               constructor() {
                    this.currentNotebook = null;
                    this.currentSection = null;
                    this.currentSubsection = null;
                    this.currentEditingId = null;
                    this.currentMode = 'draw';
                    this.excalidrawAPI = null;
                    this.excalidrawRoot = null;
                    this.isLoading = false;
                    this.saveTimeout = null; // Add this line
                    this.currentTheme = 'dark';
                    // this.init();
                    this.pluginButtons = [
                         {
                              label: '⇔', // Text on the button
                              action: 'pluginThemeSwitch' // The EXACT name of the function to call
                         },
                         {
                              label: 'plt', // The text on the button
                              action: 'pluginShowMathPlotter' // The function that will run on click
                         },
                         {
                              label: 'Md', // The text on the button
                              action: 'pluginShowMarkdownRenderer' // The function to call
                         }
                    ];
               }

               async init() {
                    this.storage = new IDBStorage();
                    this.notebooks = JSON.parse(await this.storage.getItem('notebooks') || '[]');
                    this.expandedNotebooks = JSON.parse(await this.storage.getItem('expandedNotebooks') || '[]');
                    this.expandedSections = JSON.parse(await this.storage.getItem('expandedSections') || '[]');

                    this.renderNotebooks();

                    // Setup event listeneres here
                    const strokeSlider = document.getElementById('strokeWidthSlider');
                    if (strokeSlider) {
                         strokeSlider.addEventListener('input', (event) => {
                              this.setStrokeWidth(event.target.value);
                         });
                    }
                    const fontSelect = document.getElementById('fontFamilySelect');
                    if (fontSelect) {
                         fontSelect.addEventListener('change', (event) => {
                              this.setFontFamily(event.target.value);
                         });
                    }

                    this.renderColorPalette()
                    this.renderPlugins();
                    this.applySidebarState()
               }

               toggleSidebar() {
                    const sidebar = document.querySelector('.sidebar');
                    if (sidebar) {
                         sidebar.classList.toggle('collapsed');
                         this.isSidebarCollapsed = sidebar.classList.contains('collapsed');
                         this.storage.setItem('sidebarCollapsed', JSON.stringify(this.isSidebarCollapsed));
                    }
               }

               applySidebarState() {
                    if (this.isSidebarCollapsed) {
                         document.querySelector('.sidebar')?.classList.add('collapsed');
                    }
               }

               renderColorPalette() {
                    const colors = [
                         '#000000', '#e03131', '#2f9e44', '#1971c2', '#f08c00',
                         '#862e9c', '#c92a2a', '#5f3dc4', '#ffffff', '#868e96'
                    ]; // Black, Red, Green, Blue, Orange, Purple, Crimson, Violet, White, Gray
                    const paletteContainer = document.getElementById('colorPalette');
                    if (!paletteContainer) return;

                    paletteContainer.innerHTML = ''; // Clear existing swatches
                    colors.forEach((color, index) => {
                         const swatch = document.createElement('div');
                         swatch.className = 'color-swatch';
                         if (index === 0) {
                              swatch.classList.add('active'); // Set black as default active
                         }
                         swatch.style.backgroundColor = color;
                         swatch.dataset.color = color;

                         // For the white swatch, add a visible border
                         if (color === '#ffffff') {
                              swatch.style.border = '1px solid #ced4da';
                         }

                         swatch.addEventListener('click', () => this.setStrokeColor(color));
                         paletteContainer.appendChild(swatch);
                    });
               }

               generateId() {
                    return Date.now().toString(36) + Math.random().toString(36).substr(2);
               }

               async saveToStorage() {
                    await this.storage.setItem('notebooks', JSON.stringify(this.notebooks));
                    await this.storage.setItem('expandedNotebooks', JSON.stringify(this.expandedNotebooks));
                    await this.storage.setItem('expandedSections', JSON.stringify(this.expandedSections));
               }

               async createNotebook(name) {
                    const notebook = {
                         id: this.generateId(),
                         name: name,
                         sections: [],
                         createdAt: new Date().toISOString()
                    };
                    this.notebooks.push(notebook);
                    await this.saveToStorage();
                    this.renderNotebooks();
                    return notebook;
               }

               async createSection(notebookId, name) {
                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    if (notebook) {
                         const section = {
                              id: this.generateId(),
                              name: name,
                              subsections: [],
                              drawingData: null,
                              createdAt: new Date().toISOString()
                         };
                         notebook.sections.push(section);
                         await this.saveToStorage();
                         this.renderNotebooks();
                         return section;
                    }
               }

               async createSubsection(notebookId, sectionId, name) {
                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    if (notebook) {
                         const section = notebook.sections.find(s => s.id === sectionId);
                         if (section) {
                              const subsection = {
                                   id: this.generateId(),
                                   name: name,
                                   drawingData: null,
                                   createdAt: new Date().toISOString()
                              };
                              section.subsections.push(subsection);
                              await this.saveToStorage();
                              this.renderNotebooks();
                              return subsection;
                         }
                    }
               }

               async deleteNotebook(id) {
                    if (confirm('Are you sure you want to delete this notebook? This action cannot be undone.')) {
                         this.notebooks = this.notebooks.filter(n => n.id !== id);
                         await this.saveToStorage();
                         this.renderNotebooks();
                         this.showEmptyState();
                    }
               }

               async deleteSection(notebookId, sectionId) {
                    if (confirm('Are you sure you want to delete this section?')) {
                         const notebook = this.notebooks.find(n => n.id === notebookId);
                         if (notebook) {
                              notebook.sections = notebook.sections.filter(s => s.id !== sectionId);
                              await this.saveToStorage();
                              this.renderNotebooks();
                              if (this.currentSection === sectionId) {
                                   this.showEmptyState();
                              }
                         }
                    }
               }

               async deleteSubsection(notebookId, sectionId, subsectionId) {
                    if (confirm('Are you sure you want to delete this subsection?')) {
                         const notebook = this.notebooks.find(n => n.id === notebookId);
                         if (notebook) {
                              const section = notebook.sections.find(s => s.id === sectionId);
                              if (section) {
                                   section.subsections = section.subsections.filter(sub => sub.id !== subsectionId);
                                   await this.saveToStorage();
                                   this.renderNotebooks();
                                   if (this.currentSubsection === subsectionId) {
                                        this.showEmptyState();
                                   }
                              }
                         }
                    }
               }

               toggleNotebook(notebookId) {
                    const index = this.expandedNotebooks.indexOf(notebookId);
                    if (index > -1) {
                         this.expandedNotebooks.splice(index, 1);
                    } else {
                         this.expandedNotebooks.push(notebookId);
                    }
                    this.saveToStorage();
                    this.renderNotebooks();
               }

               toggleSection(sectionId) {
                    const index = this.expandedSections.indexOf(sectionId);
                    if (index > -1) {
                         this.expandedSections.splice(index, 1);
                    } else {
                         this.expandedSections.push(sectionId);
                    }
                    this.saveToStorage();
                    this.renderNotebooks();
               }

                    if (this.isLoading) return; // ADD THIS LINE
                    this.deinitializeDrawMode()
                    this.isLoading = true;      // ADD THIS LINE

                    this.saveCurrentContent();
                    this.currentNotebook = notebookId;
                    this.currentSection = sectionId;
                    this.currentSubsection = null;
                    this.currentEditingId = `${notebookId}-${sectionId}`;

                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    const section = notebook.sections.find(s => s.id === sectionId);

                    this.updateHeader(notebook.name, section.name, '');
                    this.loadContent(section);
                    this.renderNotebooks();
               }

               selectSubsection(notebookId, sectionId, subsectionId) {
                    if (this.isLoading) return; // ADD THIS LINE
                    this.deinitializeDrawMode();
                    this.isLoading = true;      // ADD THIS LINE

                    this.saveCurrentContent();
                    this.currentNotebook = notebookId;
                    this.currentSection = sectionId;
                    this.currentSubsection = subsectionId;

               // Replace the initializeExcalidraw method in the ksai_note class with this completely fixed version:
               // Replace your existing initializeExcalidraw function with this one.
               initializeExcalidraw(initialData = null) {
                    const container = document.getElementById('excalidrawContainer');
                    if (this.excalidrawRoot) {
                         this.excalidrawRoot.unmount();
                    }

                    // Store reference to this for use in component
                    const self = this;

                    // 1. Prepare the COMPLETE initial data object upfront.
                    const fullInitialData = {
                         elements: initialData?.elements || [],
                         files: initialData?.files || {}, // Pass files here!
                         appState: {
                              // Your default settings
                              theme: this.currentTheme,
                              zenModeEnabled: true,
                              currentItemStrokeWidth: parseFloat(document.getElementById('strokeWidthSlider')?.value || 0.3),
                              currentItemStrokeColor: document.querySelector('.color-swatch.active')?.dataset.color || '#000000',
                              currentItemFontFamily: parseInt(document.getElementById('fontFamilySelect')?.value || 4),
                              currentItemFontSize: parseInt(document.querySelector('.size-btn.active')?.value || '28'),
                              // Merge with saved appState, if it exists
                              ...(initialData?.appState || {})
                         }
                    };

                    // 2. Create the React component, passing the full data object.
                    const ExcalidrawComponent = React.createElement(ExcalidrawLib.Excalidraw, {
                         excalidrawAPI: (api) => {
                              self.excalidrawAPI = api;
                         },
                         onChange: (elements, appState) => {
                              // Auto-save still works the same.
                              self.saveDrawingData(elements, appState);
                         },
                         UIOptions: {
                              canvasActions: {
                                   changeViewBackgroundColor: false
                              }
                         },
                         // Pass the complete data object here.
                         initialData: fullInitialData
                    });

                    // 3. Render the component.
                    this.excalidrawRoot = createRoot(container);
                    this.excalidrawRoot.render(ExcalidrawComponent);

                    // Show the container and set the loading flag
                    setTimeout(() => {
                         this.isLoading = false;
                         this.initializeDrawMode();
                    }, 200)
               }

               setStrokeWidth(width) {
                    if (!this.excalidrawAPI) return;

                    const numericWidth = parseFloat(width);
                    const selectedElementIds = this.excalidrawAPI.getAppState().selectedElementIds;

                    if (Object.keys(selectedElementIds).length > 0) {
                         const allElements = this.excalidrawAPI.getSceneElements();
                         const newElements = allElements.map(element => {
                              if (selectedElementIds[element.id]) {
                                   return { ...element, strokeWidth: numericWidth };
                              }
                              return element;
                         });
                         this.excalidrawAPI.updateScene({ elements: newElements });
                    }

                    this.excalidrawAPI.updateScene({
                         appState: { currentItemStrokeWidth: numericWidth }
                    });

                    const valueDisplay = document.getElementById('strokeWidthValue');
                    if (valueDisplay) valueDisplay.textContent = numericWidth.toFixed(1);
               }


               setStrokeColor(color) {
                    if (!this.excalidrawAPI) return;

                    const selectedElementIds = this.excalidrawAPI.getAppState().selectedElementIds;

                    if (Object.keys(selectedElementIds).length > 0) {
                         const allElements = this.excalidrawAPI.getSceneElements();
                         const newElements = allElements.map(element => {
                              if (selectedElementIds[element.id]) {
                                   return { ...element, strokeColor: color };
                              }
                              return element;
                         });
                         this.excalidrawAPI.updateScene({ elements: newElements });
                    }

                    this.excalidrawAPI.updateScene({
                         appState: { currentItemStrokeColor: color }
                    });

                    document.querySelectorAll('.color-swatch').forEach(swatch => {
                         swatch.classList.toggle('active', swatch.dataset.color === color);

                    const numericFont = parseInt(fontValue, 10);
                    const selectedElementIds = this.excalidrawAPI.getAppState().selectedElementIds;

                    if (Object.keys(selectedElementIds).length > 0) {
                         const allElements = this.excalidrawAPI.getSceneElements();
                         const newElements = allElements.map(element => {
                              // Check if element is a selected text element
                              if (selectedElementIds[element.id] && element.type === 'text') {
                                   return { ...element, fontFamily: numericFont };

                              return element;
                         });
                         this.excalidrawAPI.updateScene({ elements: newElements });

                    this.excalidrawAPI.updateScene({

               async plotEquation(options) {
                    const { equation: equationInput, thickness, ticks } = options;
                    if (!this.excalidrawAPI || !equationInput) return;

                    try {
                         const currentStrokeColor = this.excalidrawAPI.getAppState().currentItemStrokeColor;
                         const equation = equationInput.split('=')[1].trim();
                         const code = math.parse(equation).compile();
                         const data = d3.range(-10, 10.1, 0.1).map(x => ({ x, y: code.evaluate({ x }) })).filter(d => isFinite(d.y));

                         if (data.length < 2) throw new Error("Not enough data points to plot.");

                         const width = 400, height = 300;
                         const margin = { top: 20, right: 20, bottom: 30, left: 40 };
                         const svg = d3.create("svg").attr("width", width).attr("height", height).attr("viewBox", [0, 0, width, height]).style("background-color", "transparent");
                         const x = d3.scaleLinear().domain(d3.extent(data, d => d.x)).nice().range([margin.left, width - margin.right]);
                         const y = d3.scaleLinear().domain(d3.extent(data, d => d.y)).nice().range([height - margin.bottom, margin.top]);

                         svg.append("g").attr("transform", `translate(0,${height - margin.bottom})`).call(d3.axisBottom(x).ticks(ticks));
                         svg.append("g").attr("transform", `translate(${margin.left},0)`).call(d3.axisLeft(y).ticks(ticks));

                         svg.append("path").datum(data).attr("fill", "none").attr("stroke", currentStrokeColor).attr("stroke-width", thickness).attr("d", d3.line().x(d => x(d.x)).y(d => y(d.y)));

                         const svgString = new XMLSerializer().serializeToString(svg.node());
                         const dataURL = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgString)));

                         // --- CORRECTED POSITIONING LOGIC ---
                         // 1. Get the current state of the Excalidraw app
                         const appState = this.excalidrawAPI.getAppState();

                         // 2. Calculate the center of the current viewport
                         const startX = -appState.scrollX + appState.width / 2;
                         const startY = -appState.scrollY + appState.height / 2;

                         const fileId = this.generateId();

                         const imageSkeleton = {
                              type: "image",
                              x: startX,
                              y: startY,
                              width: width,
                              height: height,
                              fileId: fileId
                         };

                         const existingElements = this.excalidrawAPI.getSceneElements();
                         const newElements = ExcalidrawLib.convertToExcalidrawElements([imageSkeleton]);
                         this.excalidrawAPI.addFiles({ [fileId]: { mimeType: "image/svg+xml", dataURL, id: fileId } });
                         this.excalidrawAPI.updateScene({
                              elements: [...existingElements, ...newElements]
                         });

                    } catch (error) {
                         console.error("Math Plotter Error:", error);
                         alert(`Could not plot the equation. Please check the syntax.\nError: ${error.message}`);
                    }
               }

                    const textarea = document.createElement('textarea');
                    textarea.value = markdownContent;
                    const renderBtn = document.createElement('button');
                    renderBtn.textContent = 'Render Markdown';

                    // --- NEW: Focus Trap & Click-Outside Logic ---

                    const closeUI = () => {
                         ui.remove();
                         // IMPORTANT: Clean up the event listeners
                         document.removeEventListener('mousedown', handleClickOutside);
                         document.removeEventListener('keydown', handleFocusTrap);
                    };

                    const handleClickOutside = (e) => {
                         if (!ui.contains(e.target) && e.target !== button) {
                              closeUI();
                         }
                    };

                    const handleFocusTrap = (e) => {
                         if (e.key !== 'Tab') return;

                         const focusableElements = ui.querySelectorAll(
                              'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
                         );
                         const firstElement = focusableElements[0];
                         const lastElement = focusableElements[focusableElements.length - 1];

                         // Note: The textarea is the only focusable element besides buttons here.
                         // For more complex popups, this logic is essential.
                         if (e.shiftKey) {
                              if (document.activeElement === firstElement) {
                                   lastElement.focus();
                                   e.preventDefault();
                              }
                         } else {
                              if (document.activeElement === lastElement) {
                                   firstElement.focus();
                                   e.preventDefault();
                              }
                         }
                    };

                    // --- Assign Event Handlers ---
                    closeBtn.onclick = closeUI;
                    renderBtn.onclick = () => {
                         this.renderMarkdown(textarea.value);
                         closeUI(); // Close UI after rendering
                    };

                    // --- Append elements, style them, and add listeners ---
                    content.appendChild(textarea);
                    content.appendChild(renderBtn);
                    ui.appendChild(header);
                    ui.appendChild(content);

                    document.body.appendChild(ui);

               async renderMarkdown(markdownText) {
                    if (!this.excalidrawAPI || !markdownText.trim()) return;

                    // --- 1. Initial Setup ---
                    const appState = this.excalidrawAPI.getAppState();
                    const existingElements = this.excalidrawAPI.getSceneElements();

                    const FONT_FAMILY = parseInt(document.getElementById('fontFamilySelect')?.value || 4);
                    const STROKE_COLOR = document.querySelector('.color-swatch.active')?.dataset.color || '#000000';
                    const SIZES = {
                         H1: 58, H2: 48, H3: 38,
                         N: parseInt(document.querySelector('.size-btn.active')?.value || '28')
                    };

                    const PADDING = 15;
                    const LINE_HEIGHT = 1.25;
                    const INDENT_WIDTH = 35;

                    let elements = [];
                    let currentY = 0;

                    // --- 2. Helper to reconstruct inline text (bold, italics, etc.) ---
                    const reconstructInline = (tokens) => tokens ? tokens.map(t => t.raw).join('') : '';

                    // --- 3. The main recursive rendering function ---
                    const processTokens = (tokens, listLevel = 0) => {
                         const currentIndent = listLevel * INDENT_WIDTH;

                         tokens.forEach(token => {
                              switch (token.type) {
                                   case 'space':
                                        currentY += PADDING / 2;
                                        break;

                                   case 'heading':
                                        elements.push({
                                             type: 'text', text: token.text,
                                             x: currentIndent, y: currentY,
                                             fontSize: SIZES[`H${token.depth}`] || SIZES.N,
                                             fontFamily: FONT_FAMILY, strokeColor: STROKE_COLOR
                                        });
                                        currentY += (SIZES[`H${token.depth}`] || SIZES.N) + PADDING;
                                        break;

                                   case 'paragraph':
                                        const pText = reconstructInline(token.tokens);
                                        elements.push({
                                             type: 'text', text: pText,
                                             x: currentIndent, y: currentY,
                                             fontSize: SIZES.N, fontFamily: FONT_FAMILY,
                                             strokeColor: STROKE_COLOR, lineHeight: LINE_HEIGHT
                                        });
                                        currentY += SIZES.N * LINE_HEIGHT * pText.split('\n').length + PADDING;
                                        break;

                                   // FIX: THIS NEW 'text' CASE IS THE SOLUTION
                                   case 'text':
                                        // This handles the content inside list items, which is parsed as a 'text' token.
                                        const inlineText = reconstructInline(token.tokens);
                                        elements.push({
                                             type: 'text', text: inlineText,
                                             x: currentIndent, y: currentY,
                                             fontSize: SIZES.N, fontFamily: FONT_FAMILY,
                                             strokeColor: STROKE_COLOR, lineHeight: LINE_HEIGHT
                                        });
                                        // Advance the cursor after rendering the text
                                        currentY += SIZES.N * LINE_HEIGHT * inlineText.split('\n').length;
                                        break;

                                   case 'list':
                                        token.items.forEach(item => {
                                             const bulletX = ((listLevel) * INDENT_WIDTH);
                                             elements.push({
                                                  type: 'text', text: '•',
                                                  x: bulletX, y: currentY,
                                                  fontSize: SIZES.N, fontFamily: FONT_FAMILY, strokeColor: STROKE_COLOR
                                             });

                                             // Process the list item's content with an increased list level for indentation.
                                             processTokens(item.tokens, listLevel + 1);
                                        });
                                        // Add a small gap after the entire list is processed
                                        currentY += PADDING / 2;
                                        break;

                                   case 'table':
                                        const headerBgColor = '#333333';
                                        const headerFontColor = '#ffffff';
                                        let tableRowY = currentY;

                                        const colWidths = token.header.map(() => 0);
                                        const allRows = [token.header, ...token.rows];

                                        allRows.forEach(row => row.forEach((cell, i) => {
                                             const cellText = reconstructInline(cell.tokens);
                                             colWidths[i] = Math.max(colWidths[i], cellText.length * SIZES.N * 0.65);
                                        }));

                                        allRows.forEach((row, rowIndex) => {
                                             let currentCellX = currentIndent;
                                             let maxCellHeight = 0;

                                             const renderedCells = row.map((cell, i) => {
                                                  const cellText = reconstructInline(cell.tokens);
                                                  const cellHeight = (cellText.split('\n').length * SIZES.N * LINE_HEIGHT) + PADDING;
                                                  maxCellHeight = Math.max(maxCellHeight, cellHeight);
                                                  return { text: cellText, width: colWidths[i] + PADDING * 2, align: token.align[i] || 'left' };
                                             });

                                             renderedCells.forEach(cellData => {
                                                  elements.push({
                                                       type: 'rectangle', x: currentCellX, y: tableRowY,
                                                       width: cellData.width, height: maxCellHeight, strokeColor: '#444',
                                                       backgroundColor: rowIndex === 0 ? headerBgColor : 'transparent', fillStyle: 'solid'
                                                  });
                                                  elements.push({
                                                       type: 'text', text: cellData.text,
                                                       x: currentCellX + PADDING, y: tableRowY + PADDING / 2,
                                                       fontSize: SIZES.N, fontFamily: FONT_FAMILY, textAlign: cellData.align,
                                                       strokeColor: rowIndex === 0 ? headerFontColor : STROKE_COLOR
                                                  });
                                                  currentCellX += cellData.width;
                                             });
                                             tableRowY += maxCellHeight;
                                        });
                                        currentY = tableRowY + PADDING;
                                        break;
                              }
                         });
                    };

                    // --- 4. Execution & Final Positioning ---
                    const initialTokens = marked.lexer(markdownText);
                    processTokens(initialTokens);

                    const startX = -appState.scrollX + 50;
                    const startY = -appState.scrollY + 50;
                    elements.forEach(el => {
                         el.x = (el.x || 0) + startX;
                         el.y = (el.y || 0) + startY;
                    });

                    const newElements = ExcalidrawLib.convertToExcalidrawElements(elements);
                    this.excalidrawAPI.updateScene({ elements: [...existingElements, ...newElements] });
                    this.excalidrawAPI.scrollToContent(newElements, { fitToContent: true, padding: 20 });
               }
               // ADD THIS FUNCTION: Shows a prompt to select the destination notebook
               showMoveUI(type, notebookId, sectionId, subsectionId = null) {
                    const otherNotebooks = this.notebooks.filter(n => n.id !== notebookId);

                    if (otherNotebooks.length === 0) {
                         alert("No other notebooks to move to.");
                         return;
                    }

                    const notebookList = otherNotebooks.map((n, i) => `${i + 1}: ${n.name}`).join('\n');
                    const choice = prompt(`Enter the number of the notebook to move this ${type} to:\n\n${notebookList}`);

                    if (choice === null) return; // User cancelled

                    const choiceIndex = parseInt(choice, 10) - 1;
                    if (isNaN(choiceIndex) || choiceIndex < 0 || choiceIndex >= otherNotebooks.length) {
                         alert("Invalid selection.");
                         return;
                    }

                    const targetNotebook = otherNotebooks[choiceIndex];
                    this.moveItem(type, notebookId, targetNotebook.id, sectionId, subsectionId);
               }

               // ADD THIS FUNCTION: Handles the actual data manipulation for the move
               async moveItem(type, sourceNotebookId, targetNotebookId, sectionId, subsectionId) {
                    const sourceNotebook = this.notebooks.find(n => n.id === sourceNotebookId);
                    const targetNotebook = this.notebooks.find(n => n.id === targetNotebookId);

                    if (!sourceNotebook || !targetNotebook) return;

                    let itemToMove = null;
                    let itemIsActive = false;

                    if (type === 'section') {
                         const sectionIndex = sourceNotebook.sections.findIndex(s => s.id === sectionId);
                         if (sectionIndex > -1) {
                              itemToMove = sourceNotebook.sections[sectionIndex];
                              sourceNotebook.sections.splice(sectionIndex, 1);
                              targetNotebook.sections.push(itemToMove);
                              if (this.currentSection === sectionId) itemIsActive = true;
                         }
                    } else if (type === 'subsection') {
                         const sourceSection = sourceNotebook.sections.find(s => s.id === sectionId);
                         if (sourceSection) {
                              const subsectionIndex = sourceSection.subsections.findIndex(sub => sub.id === subsectionId);
                              if (subsectionIndex > -1) {
                                   const subsection = sourceSection.subsections[subsectionIndex];
                                   // Promote the subsection to a full section in the new notebook
                                   itemToMove = {
                                        id: subsection.id,
                                        name: subsection.name,
                                        textContent: subsection.textContent,
                                        drawingData: subsection.drawingData,
                                        createdAt: subsection.createdAt,
                                        subsections: [] // It's now a top-level section
                                   };
                                   sourceSection.subsections.splice(subsectionIndex, 1);
                                   targetNotebook.sections.push(itemToMove);
                                   if (this.currentSubsection === subsectionId) itemIsActive = true;
                              }
                         }
                    }

                    if (itemToMove) {
                         // If the moved item was being viewed, reset the editor to the empty state
                         if (itemIsActive) {
                              this.showEmptyState();
                              // Also update header to avoid showing old info
                              document.getElementById('contentHeader').style.display = 'none';
                         }
                         await this.saveToStorage();
                         this.renderNotebooks();
                         alert(`Successfully moved '${itemToMove.name}' to '${targetNotebook.name}'.`);
                    }
               }

               async showRenameInput(type, notebookId, sectionId, subsectionId) {
                    let item;
                    let notebook = this.notebooks.find(n => n.id === notebookId);
                    if (!notebook) return;

                    if (type === 'notebook') {
                         item = notebook;
                    } else if (type === 'section') {
                         item = notebook.sections.find(s => s.id === sectionId);
                    } else {
                         item = notebook.sections.find(s => s.id === sectionId)?.subsections.find(sub => sub.id === subsectionId);
                    }

                    if (!item) {
                         console.error("Could not find the item to rename.");
                         return;
                    }

                    const newName = prompt(`Enter the new name for "${item.name}":`, item.name);

                    // Check if the user clicked "Cancel" or entered an empty name
                    if (newName === null || newName.trim() === '') {
                         return; // Do nothing
                    }

                    // Update the name, save, and re-render the list
                    item.name = newName.trim();
                    await this.saveToStorage();
                    this.renderNotebooks();

                    // If the currently viewed item was renamed, update the header
                    if (this.currentNotebook === notebookId && (this.currentSection === sectionId || this.currentSubsection === subsectionId)) {
                         const currentNotebook = this.notebooks.find(n => n.id === this.currentNotebook);
                         const currentSection = currentNotebook?.sections.find(s => s.id === this.currentSection);
                         const currentSubsection = currentSection?.subsections.find(sub => sub.id === this.currentSubsection);
                         this.updateHeader(currentNotebook.name, currentSection?.name, currentSubsection?.name);
                    }
               }

               // Also update the saveDrawingData method to ensure proper data structure:
               async saveDrawingData(elements, appState) {
                    clearTimeout(this.saveTimeout);

                    this.saveTimeout = setTimeout(async () => {

                         if (!this.currentEditingId || !this.excalidrawAPI) return;

                         const files = this.excalidrawAPI.getFiles();

                         // Create a clean appState object with only serializable properties
                         const cleanAppState = {
                              viewBackgroundColor: appState.viewBackgroundColor,
                              currentItemStrokeColor: appState.currentItemStrokeColor,
                              currentItemBackgroundColor: appState.currentItemBackgroundColor,
                              currentItemFillStyle: appState.currentItemFillStyle,
                              currentItemFontFamily: appState.currentItemFontFamily,
                              currentItemStrokeWidth: appState.currentItemStrokeWidth,
                              currentItemStrokeStyle: appState.currentItemStrokeStyle,
                              currentItemRoughness: appState.currentItemRoughness,
                              currentItemOpacity: appState.currentItemOpacity,
                              gridSize: appState.gridSize,
                              colorPalette: appState.colorPalette,
                              zoom: appState.zoom,
                              scrollX: appState.scrollX,
                              scrollY: appState.scrollY
                              // Explicitly exclude collaborators and other non-serializable properties
                         };

                         const drawingData = {
                              elements: elements,
                              appState: cleanAppState,
                              files: files
                         };

                         if (this.currentSubsection) {
                              const notebook = this.notebooks.find(n => n.id === this.currentNotebook);
                              const section = notebook.sections.find(s => s.id === this.currentSection);
                              const subsection = section.subsections.find(sub => sub.id === this.currentSubsection);
                              subsection.drawingData = drawingData;
                         } else if (this.currentSection) {
                              const notebook = this.notebooks.find(n => n.id === this.currentNotebook);
                              const section = notebook.sections.find(s => s.id === this.currentSection);
                              section.drawingData = drawingData;
                         }

                         await this.saveToStorage();
                    }, 5000)
               }

               showExportOptions(notebookId) {
                    const choice = prompt(
                         "Choose an export format:\n\n" +

                         "Enter '2' to export as .ksai_note"

               // ADD THIS FUNCTION: Creates the binary blob from notebook data
               toBinaryBlob(notebookId) {
                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    if (!notebook) {
                         console.error("Notebook not found for blob creation");
                         return null;
                    }
                    // Convert the notebook object to a JSON string
                    const jsonString = JSON.stringify(notebook);
                    // Create a Blob from the string. A Blob is an object that represents raw, immutable data.
                    return new Blob([jsonString], { type: "application/json" });
               }

               // ADD THIS FUNCTION: Handles downloading the .ksai_note file
               exportToBinaryBlobFile(notebookId) {
                    const blob = this.toBinaryBlob(notebookId);
                    if (!blob) return;

                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    const fileName = `${notebook.name.replace(/[^a-z0-9]/gi, "_").toLowerCase()}.ksai_note`;

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
               }

               // ADD THIS FUNCTION: Opens the file picker to select a .ksai_note file
               openFilePicker() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.ksai_note'; // Only allow .ksai_note files
                    input.onchange = event => {
                         const file = event.target.files[0];
                         if (file) {
                              this.importFromBinaryBlob(file);
                         }
                    };
                    input.click();
               }

               // ADD THIS FUNCTION: Reads the file and imports the notebook
               importFromBinaryBlob(file) {
                    const reader = new FileReader();
                    reader.onload = event => {
                         try {
                              const notebookData = JSON.parse(event.target.result);

                              // Basic validation to ensure it's a valid notebook object
                              if (notebookData && notebookData.id && notebookData.name && Array.isArray(notebookData.sections)) {

                                   // Check if a notebook with the same ID already exists
                                   if (this.notebooks.some(n => n.id === notebookData.id)) {
                                        alert(`A notebook named "${notebookData.name}" (or with the same ID) already exists.`);
                                        return;
                                   }

                                   this.notebooks.push(notebookData);
                                   this.saveToStorage();
                                   this.renderNotebooks();
                                   alert(`Successfully imported notebook: "${notebookData.name}"`);
                              } else {
                                   alert("Invalid or corrupt .ksai_note file.");
                              }
                         } catch (e) {
                              console.error("Failed to parse .ksai_note file:", e);
                              alert("Failed to read or parse the selected file.");
                         }
                    };
                    reader.readAsText(file);
               }

               // In the ksai_note class
               exportNotebook(notebookId) {
                    const notebook = this.notebooks.find(n => n.id === notebookId);
                    if (!notebook) return;

                    // --- NEW: Aggregate all files from the entire notebook ---
                    const allFiles = {};
                    notebook.sections.forEach(section => {
                         if (section.drawingData && section.drawingData.files) {
                              Object.assign(allFiles, section.drawingData.files);
                         }
                         if (section.subsections && section.subsections.length > 0) {
                              section.subsections.forEach(subsection => {
                                   if (subsection.drawingData && subsection.drawingData.files) {
                                        Object.assign(allFiles, subsection.drawingData.files);
                                   }
                              });
                         }
                    });
                    const allFilesJSON = JSON.stringify(allFiles);
                    // --- END NEW ---

                    const templateNode = document.getElementById('export-template');
                    const templateClone = templateNode.content.cloneNode(true);
                    const tempDiv = document.createElement('div');
                    tempDiv.appendChild(templateClone);
                    let htmlTemplate = tempDiv.innerHTML;

                    htmlTemplate = htmlTemplate.replace(/<temphtml/g, '<html').replace(/<\/temphtml>/g, '</html>');
                    htmlTemplate = htmlTemplate.replace(/<temphead/g, '<head').replace(/<\/temphead>/g, '</head>');
                    htmlTemplate = htmlTemplate.replace(/<tempbody/g, '<body').replace(/<\/tempbody>/g, '</body>');

                    const pageTitle = notebook.name;
                    const notebookDataJSON = JSON.stringify(notebook);
                    htmlTemplate = htmlTemplate.replace('__PAGE_TITLE__', pageTitle);
                    htmlTemplate = htmlTemplate.replace('\'__NOTEBOOK_DATA_JSON__\'', notebookDataJSON);

                    // --- NEW: Replace the new placeholder for the aggregated files ---
                    htmlTemplate = htmlTemplate.replace('\'__ALL_FILES_JSON__\'', allFilesJSON);

                    const fileName = `${notebook.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;
                    const blob = new Blob([htmlTemplate], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
               }

               closeModal(modalId) {
                    document.getElementById(modalId).style.display = 'none';
                    const inputs = document.querySelectorAll(`#${modalId} input[type = "text"]`);
                    inputs.forEach(input => input.value = '');
               }
          }

          // Global functions
          let app;

          window.showCreateNotebookModal = () => app.showCreateNotebookModal();
          window.createNotebook = async () => {
               const name = document.getElementById('notebookName').value.trim();
               if (name) {
                    await app.createNotebook(name);
                    app.closeModal('createNotebookModal');
               }
          };
          window.createSection = async () => {
               const name = document.getElementById('sectionName').value.trim();
               if (name && app.tempNotebookId) {
                    await app.createSection(app.tempNotebookId, name);
                    app.closeModal('createSectionModal');
               }
          };
          window.createSubsection = async () => {
               const name = document.getElementById('subsectionName').value.trim();
               if (name && app.tempNotebookId && app.tempSectionId) {
                    await app.createSubsection(app.tempNotebookId, app.tempSectionId, name);
                    app.closeModal('createSubsectionModal');
               }
          };
          window.closeModal = (modalId) => app.closeModal(modalId);
          window.switchToTextMode = () => app.switchToTextMode();
          window.switchToDrawMode = () => app.switchToDrawMode();

          // Handle keyboard shortcuts
          document.addEventListener('keydown', (e) => {
               if (e.key === 'Enter') {
                    if (document.getElementById('createNotebookModal').style.display === 'flex') {
                         createNotebook();
                    } else if (document.getElementById('createSectionModal').style.display === 'flex') {
                         createSection();
                    } else if (document.getElementById('createSubsectionModal').style.display === 'flex') {
                         createSubsection();
                    }
               } else if (e.key === 'Escape') {
                    closeModal('createNotebookModal');
                    closeModal('createSectionModal');
                    closeModal('createSubsectionModal');
               }
          });

          // Initialize app
          document.addEventListener('DOMContentLoaded', async () => {
               app = new ksai_note();
               await app.init();
               window.app = app; // Make globally accessible
          });

          // Save before page unload
          window.addEventListener('beforeunload', () => {
               if (app) {
                    app.saveCurrentContent();
               }
          });
     </script>

                    <script type="module">
                         import * as ExcalidrawLib from 'https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.js?external=react,react-dom';
                         import React from "react";
                         import { createRoot } from "https://esm.sh/react-dom@19.0.0/client";

                         const notebook = '__NOTEBOOK_DATA_JSON__'; // Notebook structure placeholder
                         // --- NEW: This placeholder will hold all image data for the notebook ---
                         const allFiles = '__ALL_FILES_JSON__'; // All files data placeholder

                         let excalidrawAPI = null;
                         let activeElement = null;

                         // --- Sidebar Toggle Functionality ---
                         const sidebar = document.getElementById('navSidebar');
                         const hamburgerBtn = document.getElementById('hamburger-btn');
                         hamburgerBtn.addEventListener('click', () => {
                              sidebar.classList.toggle('collapsed');
                         });

                         function renderNavigation() {
                              const navContainer = document.getElementById('navSidebar');
                              let navHtml = `<h1>📓 ${notebook.name}</h1><ul>`;
                              notebook.sections.forEach((section, s_idx) => {
                                   const sectionId = `page-${s_idx}`;
                                   navHtml += `<li id="${sectionId}" onclick="window.loadPage('section', ${s_idx})">📄 ${section.name}</li>`;
                                   if (section.subsections && section.subsections.length > 0) {
                                        section.subsections.forEach((subsection, sub_idx) => {
                                             const subsectionId = `page-${s_idx}-${sub_idx}`;
                                             navHtml += `<li class="subsection" id="${subsectionId}" onclick="window.loadPage('subsection', ${s_idx}, ${sub_idx})">📋 ${subsection.name}</li>`;
                                        });
                                   }
                              });
                              navHtml += '</ul>';
                              navContainer.innerHTML = navHtml;
                         }

                         window.loadPage = (type, sectionIndex, subsectionIndex) => {
                              document.getElementById('welcome-message').classList.add('hidden');
                              document.getElementById('excalidraw-container').classList.remove('hidden');

                              let item;
                              let itemId;
                              if (type === 'section') {
                                   item = notebook.sections[sectionIndex];
                                   itemId = `page-${sectionIndex}`;
                              } else {
                                   item = notebook.sections[sectionIndex].subsections[subsectionIndex];
                                   itemId = `page-${sectionIndex}-${subsectionIndex}`;
                              }

                              if (activeElement) {
                                   activeElement.classList.remove('active');
                              }
                              activeElement = document.getElementById(itemId);
                              if (activeElement) {
                                   activeElement.classList.add('active');
                              }

                              const drawingData = item.drawingData || { elements: [], appState: {} };

                              if (excalidrawAPI) {
                                   const sceneToLoad = {
                                        elements: drawingData.elements,
                                        appState: { ...(drawingData.appState || {}), theme: 'dark' },
                                        files: allFiles
                                   };

                                   // Use a short timeout to ensure the DOM is ready for the new scene
                                   setTimeout(() => {
                                        excalidrawAPI.updateScene(sceneToLoad);

                                        // After updating the scene, scroll and zoom to fit the new content.
                                        // We check if there are any elements to prevent errors on empty pages.
                                        if (sceneToLoad.elements && sceneToLoad.elements.length > 0) {
                                             excalidrawAPI.scrollToContent(sceneToLoad.elements, { fitToContent: true });
                                        }
                                   }, 100); // A 100ms delay is usually safe for the scene to update.
                              }
                         };

                         const container = document.getElementById('excalidraw-container');
                         const root = createRoot(container);

                         // --- MODIFIED: Pass the master files object on initial creation ---
                         // This makes the initial state aware of all possible images.
                         const ExcalidrawComponent = () => React.createElement(ExcalidrawLib.Excalidraw, {
                              excalidrawAPI: (api) => { excalidrawAPI = api; },
                              viewModeEnabled: true,
                              initialData: {
                                   appState: { theme: 'dark' },
                                   files: allFiles // Pass the master files object here too!
                              }
                         });

                         root.render(React.createElement(ExcalidrawComponent));
                         renderNavigation();
                    </script>
